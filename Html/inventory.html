<!doctype html>
<html lang="en">
<head>
    <title>Kaarten Verzameling - Chest Chasers</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.3.2 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />
    <!-- shared styles -->
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/inventory.css" />
</head>
<body>
    <header>
        <nav class="navbar navbar-light" id="navbar-custom">
            <div class="container-fluid justify-content-center">
                <a class="navbar-brand" href="../index.html">Chest Chasers</a>
            </div>
        </nav>
    </header>
    <main class="container my-4">
        <div>
            Munten: <span id="coin-count">0</span> 
            <button id="buy-button" class="btn btn-sm">
                Kaart Kopen (10 munten)
            </button>
            </button>
            <button id="sell-button" class="btn btn-sm">
                Verkoopextras
            </button>
        </div>

        <h3 class="mt-4"> Mijn Verzameling</h3>
        <div id="inventory-list"></div>
        <a href="map.html" class="btn btn-primary mt-4">🗺️ Terug naar Kaart</a>
    </main>
    <footer>
        <p>Ga naar buiten en verzamel kaarten! 🌞</p>
    </footer>

    <!-- modal for enlarged card -->
    <div id="card-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modal-image" src="" alt="Kaart">
        </div>
    </div>

    <!-- Bootstrap scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"></script>

    <!-- your game logic -->
    <script src="../JavaScript/inventory.js"></script>
</body>
</html>
